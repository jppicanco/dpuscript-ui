<!-- Modal de geracao DOCX/PDF a partir de .txt do PAJ -->
<dialog id="docgen-modal" class="modal">
    <div class="modal-box w-11/12 max-w-3xl">
        <h3 class="font-bold text-lg mb-2">Gerar DOCX/PDF</h3>
        <p class="text-sm text-base-content/60 mb-4">
            Formata um .txt elaborado em DOCX institucional DPU (+ PDF se LibreOffice
            instalado). Output salvo na pasta do PAJ.
        </p>

        <!-- Loading inicial -->
        <div id="docgen-loading" class="py-8 text-center">
            <span class="loading loading-spinner loading-md"></span>
            <p class="text-sm text-base-content/60 mt-2">Carregando arquivos .txt...</p>
        </div>

        <!-- Form -->
        <div id="docgen-form" style="display:none;">
            <div class="form-control mb-3">
                <label class="label"><span class="label-text text-sm">Arquivo .txt</span></label>
                <select id="docgen-arquivo" class="select select-bordered select-sm w-full">
                    <option value="">-- selecione --</option>
                </select>
                <span id="docgen-no-txts" class="label-text-alt text-warning mt-1" style="display:none;">
                    Nenhum .txt encontrado na raiz deste PAJ. Elabore peça primeiro.
                </span>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="form-control">
                    <label class="label"><span class="label-text text-sm">Tipo de peça</span></label>
                    <select id="docgen-tipo" class="select select-bordered select-sm">
                        <option value="">-- selecione --</option>
                        <option value="agravo">Agravo (interno/regimental)</option>
                        <option value="embargos">Embargos de declaração</option>
                        <option value="memoriais">Memoriais</option>
                        <option value="despacho">Despacho/arquivamento</option>
                    </select>
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text text-sm">Tribunal (opcional)</span></label>
                    <select id="docgen-tribunal" class="select select-bordered select-sm">
                        <option value="">infere do processo</option>
                        <option value="tnu">TNU</option>
                        <option value="stj">STJ</option>
                    </select>
                </div>
            </div>

            <button class="btn btn-primary btn-sm w-full mt-4" id="docgen-btn-gerar"
                    onclick="executarDocgen()">
                Gerar DOCX
            </button>
        </div>

        <!-- Log streaming -->
        <div id="docgen-log-box" class="mt-4" style="display:none;">
            <div class="flex items-center justify-between mb-2">
                <span class="text-sm font-semibold">Progresso:</span>
                <span id="docgen-status" class="badge badge-sm badge-warning">rodando</span>
            </div>
            <div id="docgen-log"
                 class="bg-neutral text-neutral-content font-mono text-xs p-3 rounded-lg h-72 overflow-y-auto whitespace-pre-wrap">
            </div>
        </div>

        <div class="modal-action">
            <form method="dialog">
                <button class="btn btn-sm btn-ghost">Fechar</button>
            </form>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>fechar</button></form>
</dialog>
